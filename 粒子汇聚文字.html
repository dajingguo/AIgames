<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瞳码编程 - 粒子汇聚特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at center, #000000 0%, #0a0a0a 50%, #000000 100%);
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        #canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .subtitle {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            letter-spacing: 8px;
            animation: fadeIn 2s ease-out 3s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            z-index: 10;
            justify-content: center;
            max-width: 90%;
        }

        .btn {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2) 0%, rgba(118, 75, 162, 0.2) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 18px;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            white-space: nowrap;
        }

        .btn:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.4) 0%, rgba(118, 75, 162, 0.4) 100%);
            border-color: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .btn.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.6) 0%, rgba(118, 75, 162, 0.6) 100%);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .mode-display {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
            letter-spacing: 3px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="mode-display" id="modeDisplay">汇聚模式: 直接</div>
    <div class="subtitle">点击屏幕重新汇聚</div>
    <div class="controls">
        <button class="btn active" onclick="setAnimationMode(0)">直接</button>
        <button class="btn" onclick="setAnimationMode(1)">螺旋</button>
        <button class="btn" onclick="setAnimationMode(2)">扩散收缩</button>
        <button class="btn" onclick="setAnimationMode(3)">水波</button>
        <button class="btn" onclick="setAnimationMode(4)">随机路径</button>
        <button class="btn" onclick="resetAnimation()">重新汇聚</button>
        <button class="btn" onclick="changeColorTheme()">更换配色</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const modeDisplay = document.getElementById('modeDisplay');

        let particles = [];
        let text = '瞳码编程';
        let animationMode = 0;

        const modeNames = ['直接', '螺旋', '扩散收缩', '水波', '随机路径'];

        let colorThemes = [
            ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'],
            ['#00c6ff', '#0072ff', '#00dbde', '#fc00ff', '#ff6a88'],
            ['#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#43e97b'],
            ['#fa709a', '#fee140', '#30cfd0', '#330867', '#a8edea']
        ];
        let currentTheme = 0;

        let textPixelsCache = [];
        let particleCount = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(targetX, targetY, color, index) {
                this.index = index;
                this.targetX = targetX;
                this.targetY = targetY;
                this.setStartPosition();
                this.color = color;
                this.size = Math.random() * 1.2 + 0.3;
                this.originalSize = this.size;
                this.opacity = Math.random() * 0.4 + 0.6;
                this.phase = Math.random() * Math.PI * 2;
                this.animationProgress = 0;
                this.delay = Math.random() * 0.5;
                this.initAngleAndRadius();
            }

            setStartPosition() {
                this.startX = Math.random() * canvas.width;
                this.startY = Math.random() * canvas.height;
                this.x = this.startX;
                this.y = this.startY;
            }

            initAngleAndRadius() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                this.angle = Math.atan2(this.startY - centerY, this.startX - centerX);
                this.radius = Math.sqrt(Math.pow(this.startX - centerX, 2) + Math.pow(this.startY - centerY, 2));
            }

            reset() {
                this.setStartPosition();
                this.animationProgress = 0;
                this.delay = Math.random() * 0.5;
                this.opacity = Math.random() * 0.4 + 0.6;
                this.initAngleAndRadius();
            }

            update(globalProgress) {
                this.animationProgress += 0.015;
                const t = Math.max(0, Math.min(1, this.animationProgress - this.delay));
                const easeT = this.easeOutCubic(t);

                switch (animationMode) {
                    case 0:
                        this.updateDirect(easeT);
                        break;
                    case 1:
                        this.updateSpiral(easeT);
                        break;
                    case 2:
                        this.updateExpandShrink(easeT);
                        break;
                    case 3:
                        this.updateWave(easeT);
                        break;
                    case 4:
                        this.updateRandomPath(easeT);
                        break;
                }

                this.size = this.originalSize + Math.sin(this.phase + globalProgress * 0.01) * 0.2;
                this.phase += 0.03;
            }

            easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            updateDirect(t) {
                this.x = this.startX + (this.targetX - this.startX) * t;
                this.y = this.startY + (this.targetY - this.startY) * t;
            }

            updateSpiral(t) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                const spiralAngle = this.angle + t * Math.PI * 4;
                const spiralRadius = this.radius * (1 - t);

                const midX = centerX + Math.cos(spiralAngle) * spiralRadius;
                const midY = centerY + Math.sin(spiralAngle) * spiralRadius;

                this.x = midX + (this.targetX - midX) * t;
                this.y = midY + (this.targetY - midY) * t;
            }

            updateExpandShrink(t) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;

                if (t < 0.5) {
                    const expandT = t * 2;
                    this.x = this.startX + (this.startX - centerX) * expandT * 0.5;
                    this.y = this.startY + (this.startY - centerY) * expandT * 0.5;
                } else {
                    const shrinkT = (t - 0.5) * 2;
                    const currentX = this.startX + (this.startX - centerX) * 0.5;
                    const currentY = this.startY + (this.startY - centerY) * 0.5;
                    this.x = currentX + (this.targetX - currentX) * shrinkT;
                    this.y = currentY + (this.targetY - currentY) * shrinkT;
                }
            }

            updateWave(t) {
                const waveOffset = Math.sin(t * Math.PI * 4 + this.index * 0.01) * 50 * (1 - t);
                const perpAngle = Math.atan2(this.targetY - this.startY, this.targetX - this.startX) + Math.PI / 2;

                this.x = this.startX + (this.targetX - this.startX) * t + Math.cos(perpAngle) * waveOffset;
                this.y = this.startY + (this.targetY - this.startY) * t + Math.sin(perpAngle) * waveOffset;
            }

            updateRandomPath(t) {
                const controlX = (this.startX + this.targetX) / 2 + (Math.random() - 0.5) * 200 * (1 - t);
                const controlY = (this.startY + this.targetY) / 2 + (Math.random() - 0.5) * 200 * (1 - t);

                const mt = 1 - t;
                this.x = mt * mt * this.startX + 2 * mt * t * controlX + t * t * this.targetX;
                this.y = mt * mt * this.startY + 2 * mt * t * controlY + t * t * this.targetY;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.fill();
                ctx.globalAlpha = 1;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 1.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity * 0.2;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function getTextPixels() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const textLength = text.length;
            const baseFontSize = Math.min(canvas.width, canvas.height) * 0.15;
            const fontSize = Math.min(baseFontSize, canvas.width / textLength * 0.8);

            ctx.font = `bold ${fontSize}px "Microsoft YaHei", "PingFang SC", sans-serif`;
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const x = canvas.width / 2;
            const y = canvas.height / 2;

            ctx.fillText(text, x, y);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            textPixelsCache = [];
            const gap = 2;

            for (let py = 0; py < canvas.height; py += gap) {
                for (let px = 0; px < canvas.width; px += gap) {
                    const index = (py * canvas.width + px) * 4;
                    if (imageData.data[index + 3] > 128) {
                        textPixelsCache.push({ x: px, y: py });
                    }
                }
            }

            particleCount = Math.max(8000, textPixelsCache.length * 1.5);
        }

        function getRandomColor() {
            const colors = colorThemes[currentTheme];
            return colors[Math.floor(Math.random() * colors.length)];
        }

        function initParticles() {
            particles = [];

            for (let i = 0; i < particleCount; i++) {
                let targetX, targetY;

                if (textPixelsCache.length > 0) {
                    const pixel = textPixelsCache[i % textPixelsCache.length];
                    targetX = pixel.x + (Math.random() - 0.5) * 1.5;
                    targetY = pixel.y + (Math.random() - 0.5) * 1.5;
                } else {
                    targetX = Math.random() * canvas.width;
                    targetY = Math.random() * canvas.height;
                }

                particles.push(new Particle(targetX, targetY, getRandomColor(), i));
            }
        }

        function resetAnimation() {
            getTextPixels();

            if (particles.length === 0) {
                initParticles();
            } else {
                if (particleCount !== particles.length) {
                    particles = [];
                    initParticles();
                } else {
                    particles.forEach((p, i) => {
                        if (textPixelsCache.length > 0) {
                            const pixel = textPixelsCache[i % textPixelsCache.length];
                            p.targetX = pixel.x + (Math.random() - 0.5) * 1.5;
                            p.targetY = pixel.y + (Math.random() - 0.5) * 1.5;
                        }
                        p.reset();
                    });
                }
            }
        }

        function changeColorTheme() {
            currentTheme = (currentTheme + 1) % colorThemes.length;
            particles.forEach(p => {
                p.color = getRandomColor();
            });
        }

        function setAnimationMode(mode) {
            animationMode = mode;
            modeDisplay.textContent = '汇聚模式: ' + modeNames[mode];

            document.querySelectorAll('.controls .btn').forEach((btn, index) => {
                if (index < 5) {
                    btn.classList.toggle('active', index === mode);
                }
            });

            resetAnimation();
        }

        let animationProgress = 0;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update(animationProgress);
                particle.draw();
            });

            animationProgress++;
            requestAnimationFrame(animate);
        }

        canvas.addEventListener('click', () => {
            resetAnimation();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            resetAnimation();
        });

        resizeCanvas();
        getTextPixels();
        initParticles();
        animate();
    </script>
</body>
</html>
