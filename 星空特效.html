<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学生动态星空特效</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #000000 0%, #0a0a1a 50%, #000000 100%);
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            background: radial-gradient(circle, #ffffff 0%, rgba(255, 255, 255, 0.8) 40%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--duration) ease-in-out infinite, float var(--float-duration) ease-in-out infinite;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px rgba(255, 255, 255, 0.3), 0 0 30px rgba(255, 255, 255, 0.2);
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.2;
                transform: scale(0.8);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(5px, -8px);
            }
            50% {
                transform: translate(-3px, -15px);
            }
            75% {
                transform: translate(8px, -10px);
            }
        }

        .shooting-star {
            position: absolute;
            width: 4px;
            height: 4px;
            background: linear-gradient(45deg, #ffffff, transparent);
            border-radius: 50%;
            opacity: 0;
            box-shadow: 0 0 10px #ffffff, 0 0 20px #ffffff;
        }

        .shooting-star::after {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            right: 4px;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateX(-300px) translateY(200px);
                opacity: 0;
            }
        }

        .nebula {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
        }

        .nebula-1 {
            top: 10%;
            left: 10%;
            background: radial-gradient(circle, #4a0080 0%, transparent 70%);
            animation: nebulaFloat 20s ease-in-out infinite;
        }

        .nebula-2 {
            bottom: 20%;
            right: 15%;
            background: radial-gradient(circle, #004080 0%, transparent 70%);
            animation: nebulaFloat 25s ease-in-out infinite reverse;
        }

        @keyframes nebulaFloat {
            0%, 100% {
                transform: translate(0, 0) scale(1);
            }
            50% {
                transform: translate(30px, -40px) scale(1.1);
            }
        }

        .title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .title h1 {
            font-size: 4rem;
            font-weight: 300;
            color: transparent;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            text-shadow: none;
            letter-spacing: 15px;
            animation: titleGlow 3s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
        }

        .title p {
            margin-top: 20px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 5px;
            font-weight: 200;
        }

        @keyframes titleGlow {
            0%, 100% {
                opacity: 0.8;
                filter: brightness(1);
            }
            50% {
                opacity: 1;
                filter: brightness(1.3);
            }
        }

        .star-glow {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.5);
                opacity: 0.5;
            }
        }

        .meteor {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #ffffff;
            border-radius: 50%;
            box-shadow: 0 0 20px #ffffff, 0 0 40px #ffffff;
            animation: meteorFall linear infinite;
        }

        .meteor::before {
            content: '';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.8), transparent);
            left: 6px;
        }

        @keyframes meteorFall {
            0% {
                transform: translateY(-100px) translateX(0);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) translateX(-200px);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #ffffff 0%, transparent 70%);
            border-radius: 50%;
            animation: sparkleAnim 2s ease-out forwards;
            pointer-events: none;
        }

        @keyframes sparkleAnim {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                transform: scale(1);
                opacity: 0.8;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .constellation {
            position: absolute;
            opacity: 0.3;
            pointer-events: none;
        }

        .constellation-line {
            position: absolute;
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.5), transparent);
            transform-origin: left center;
        }
    </style>
</head>
<body>
    <div class="nebula nebula-1"></div>
    <div class="nebula nebula-2"></div>
    <div class="stars-container" id="starsContainer"></div>
    
    <div class="title">
        <h1>星空</h1>
        <p>探索宇宙的奥秘</p>
    </div>

    <script>
        const starsContainer = document.getElementById('starsContainer');
        const starCount = 300;
        const shootingStarCount = 5;
        const meteorCount = 3;

        function createStar() {
            const star = document.createElement('div');
            star.className = 'star';
            
            const size = Math.random() * 3 + 1;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const floatDuration = Math.random() * 10 + 8;
            const delay = Math.random() * 5;
            const floatDelay = Math.random() * 3;

            star.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${x}%;
                top: ${y}%;
                --duration: ${duration}s;
                --float-duration: ${floatDuration}s;
                animation-delay: ${delay}s, ${floatDelay}s;
            `;

            starsContainer.appendChild(star);
            return star;
        }

        function createShootingStar() {
            const shootingStar = document.createElement('div');
            shootingStar.className = 'shooting-star';
            
            const x = Math.random() * 100;
            const y = Math.random() * 50;
            const duration = Math.random() * 1 + 0.8;

            shootingStar.style.cssText = `
                left: ${x}%;
                top: ${y}%;
                animation: shoot ${duration}s linear infinite;
            `;

            starsContainer.appendChild(shootingStar);
        }

        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';
            
            const x = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            const delay = Math.random() * 5;

            meteor.style.cssText = `
                left: ${x}%;
                top: -10px;
                animation-duration: ${duration}s;
                animation-delay: ${delay}s;
            `;

            starsContainer.appendChild(meteor);
        }

        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            starsContainer.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 2000);
        }

        for (let i = 0; i < starCount; i++) {
            createStar();
        }

        for (let i = 0; i < shootingStarCount; i++) {
            createShootingStar();
        }

        for (let i = 0; i < meteorCount; i++) {
            createMeteor();
        }

        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.7) {
                createSparkle(e.clientX, e.clientY);
            }
        });

        let lastInteraction = Date.now();
        setInterval(() => {
            if (Date.now() - lastInteraction > 5000) {
                const randomX = Math.random() * window.innerWidth;
                const randomY = Math.random() * window.innerHeight;
                createSparkle(randomX, randomY);
            }
        }, 500);

        document.addEventListener('click', (e) => {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    createSparkle(
                        e.clientX + (Math.random() - 0.5) * 100,
                        e.clientY + (Math.random() - 0.5) * 100
                    );
                }, i * 100);
            }
        });

        window.addEventListener('resize', () => {
            const existingStars = starsContainer.querySelectorAll('.star:not([data-resized])');
            if (window.innerWidth > 1920 && existingStars.length < starCount) {
                for (let i = existingStars.length; i < starCount; i++) {
                    createStar();
                }
            }
        });

        function updateStars() {
            const stars = starsContainer.querySelectorAll('.star');
            stars.forEach(star => {
                if (Math.random() > 0.99) {
                    const x = Math.random() * 100;
                    const y = Math.random() * 100;
                    star.style.left = x + '%';
                    star.style.top = y + '%';
                }
            });
        }

        setInterval(updateStars, 1000);
    </script>
</body>
</html>
